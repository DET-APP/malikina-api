name: Deploy API to Production

on:
  push:
    branches:
      - dev
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.DEPLOY_HOST }}
          username: ${{ secrets.DEPLOY_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          timeout: 300s
          script: |
            set -e
            BRANCH="${{ github.ref_name }}"
            GH_TOKEN="${{ secrets.GITHUB_TOKEN }}"
            REPO="${{ github.repository }}"

            echo "========================================"
            echo "  API Deployment — branch: $BRANCH"
            echo "========================================"

            # ── 1. Update source code ─────────────────
            if [ -d /root/malikina-api/.git ]; then
              cd /root/malikina-api
              git fetch "https://x-token:${GH_TOKEN}@github.com/${REPO}.git" "$BRANCH:$BRANCH"
              git reset --hard "$BRANCH"
            else
              git clone -b "$BRANCH" "https://x-token:${GH_TOKEN}@github.com/${REPO}.git" /root/malikina-api
            fi
            cd /root/malikina-api
            echo "✓ Code: $(git log --oneline -1)"

            # ── 2. Build Docker image ──────────────────
            docker build -t malikina-api:latest . 2>&1 | tail -5
            echo "✓ Image built"

            # ── 3. Restart API container ───────────────
            docker stop malikina-api 2>/dev/null || true
            docker rm   malikina-api 2>/dev/null || true
            cd /root/malikina
            docker compose -f docker-compose.deploy.yml up -d api
            echo "✓ Container started"

            # ── 4. Wait for API to be ready ────────────
            for i in $(seq 1 20); do
              STATUS=$(docker inspect --format='{{.State.Health.Status}}' malikina-api 2>/dev/null || echo "starting")
              if [ "$STATUS" = "healthy" ]; then
                echo "✓ API healthy (attempt $i)"
                break
              fi
              if [ $i -eq 20 ]; then
                echo "✗ API timeout — logs:"
                docker logs malikina-api --tail 30
                exit 1
              fi
              sleep 3
            done

            # ── 5. Apply migrations (idempotent) ───────
            DB_USER=$(docker exec malikina-api printenv DB_USER 2>/dev/null || echo "malikina")
            DB_NAME=$(docker exec malikina-api printenv DB_NAME 2>/dev/null || echo "malikina")
            echo "Applying migrations..."
            for sql in /root/malikina-api/db/migrations/*.sql; do
              fname=$(basename "$sql")
              if docker exec -i malikina-db psql -U "$DB_USER" -d "$DB_NAME" < "$sql" 2>/dev/null; then
                echo "  ✓ $fname"
              else
                echo "  ~ $fname (skipped/already applied)"
              fi
            done

            # ── 6. Verify ──────────────────────────────
            COUNT=$(docker exec malikina-db psql -U "$DB_USER" -d "$DB_NAME" -tAc "SELECT COUNT(*) FROM xassidas" 2>/dev/null || echo "?")
            echo ""
            echo "========================================"
            echo "✅ Deployment successful!"
            echo "   Xassidas in DB : $COUNT"
            echo "   API : https://165-245-211-201.sslip.io/api"
            echo "========================================"
