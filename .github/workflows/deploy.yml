name: Deploy API to Production

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Deploy to server via SSH
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.DEPLOY_HOST }}
          username: ${{ secrets.DEPLOY_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          command_timeout: 10m
          script: |
            set -e
            DEPLOY_PATH="${{ secrets.DEPLOY_PATH }}"
            API_PATH="$DEPLOY_PATH/api"
            REPO_URL="https://github.com/DET-APP/malikina-api.git"

            echo "🚀 Deploying malikina-api to $API_PATH"

            # Clone or pull API repo into api/ subfolder
            if [ -d "$API_PATH/.git" ]; then
              cd $API_PATH
              git config --global --add safe.directory $API_PATH
              git remote set-url origin $REPO_URL
              git fetch origin main
              git reset --hard origin/main
            else
              mkdir -p $API_PATH
              git clone -b main $REPO_URL $API_PATH
            fi

            # Copy nginx config from repo if exists
            if [ -f "$API_PATH/nginx-docker.conf" ]; then
              cp $API_PATH/nginx-docker.conf $DEPLOY_PATH/nginx-docker.conf
            fi

            # Rebuild and restart API container only
            cd $DEPLOY_PATH
            docker compose build --no-cache api
            docker compose stop api
            docker compose rm -f api
            docker compose up -d api

            # Poll /health until ready (up to 90s)
            echo "⏳ Waiting for API..."
            for i in $(seq 1 30); do
              if curl -sf http://localhost:5000/health > /dev/null 2>&1; then
                echo "✅ API healthy after ${i}x3s"
                break
              fi
              sleep 3
            done

            # Final check
            curl -sf http://localhost:5000/health || (docker compose logs api --tail 30 && exit 1)

            echo "✅ Deployment done! API: https://165-245-211-201.sslip.io/api"
