name: Deploy API to Production

on:
  push:
    branches:
      - main
      - dev

env:
  DROPLET_IP: 165.245.211.201
  DEPLOY_PATH: /var/www/malikina-api

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: ${{ github.ref == 'refs/heads/main' && 'production' || 'development' }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Deploy to server
        uses: appleboy/ssh-action@master
        with:
          host: ${{ env.DROPLET_IP }}
          username: root
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            set -e
            
            # Variables
            BRANCH="${{ github.ref_name }}"
            DEPLOY_PATH="${{ env.DEPLOY_PATH }}"
            
            echo "Deploying branch: $BRANCH"
            
            # Create deploy directory if it doesn't exist
            mkdir -p $DEPLOY_PATH
            
            # Clone or pull repository
            if [ -d "$DEPLOY_PATH/.git" ]; then
              echo "Pulling latest changes..."
              cd $DEPLOY_PATH
              git fetch origin
              git checkout $BRANCH
              git pull origin $BRANCH
            else
              echo "Cloning repository..."
              git clone -b $BRANCH https://github.com/${{ github.repository }}.git $DEPLOY_PATH
              cd $DEPLOY_PATH
            fi
            
            # Load environment variables from .deploy-secrets
            if [ -f /root/.deploy-secrets/.env.api ]; then
              export $(cat /root/.deploy-secrets/.env.api | xargs)
            fi
            
            # Create .env from environment variables
            cat > $DEPLOY_PATH/.env << EOF
            PORT=5000
            NODE_ENV=production
            DB_HOST=$DB_HOST
            DB_PORT=$DB_PORT
            DB_USER=$DB_USER
            DB_PASSWORD=$DB_PASSWORD
            DB_NAME=$DB_NAME
            FRONTEND_URL=$FRONTEND_URL
            OCR_SPACE_API_KEY=$OCR_SPACE_API_KEY
            ADMIN_SECRET=$ADMIN_SECRET
            EOF
            
            # Stop existing containers
            echo "Stopping existing containers..."
            docker-compose -f $DEPLOY_PATH/docker-compose.yml down || true
            
            # Build and start containers
            echo "Building and starting containers..."
            docker-compose -f $DEPLOY_PATH/docker-compose.yml build
            docker-compose -f $DEPLOY_PATH/docker-compose.yml up -d
            
            # Wait for API to be ready
            echo "Waiting for API to be ready..."
            sleep 10
            
            # Health check
            curl -f http://localhost:5000/ || exit 1
            
            echo "✅ Deployment successful!"
