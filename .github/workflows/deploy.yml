name: Deploy API to Production

on:
  push:
    branches:
      - main
      - dev

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: ${{ github.ref == 'refs/heads/main' && 'production' || 'development' }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Deploy to server via SSH
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.DEPLOY_HOST }}
          username: ${{ secrets.DEPLOY_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          timeout: 60s
          script: |
            set -e
            
            BRANCH="${{ github.ref_name }}"
            DEPLOY_PATH="${{ secrets.DEPLOY_PATH }}"
            
            echo "================================"
            echo "🚀 API Deployment"
            echo "Branch: $BRANCH"
            echo "Path: $DEPLOY_PATH"
            echo "================================"
            
            # Create deploy directory if needed
            mkdir -p $DEPLOY_PATH
            
            # Git operations
            REPO_URL="https://github.com/DET-APP/malikina-api.git"
            
            if [ -d "$DEPLOY_PATH/.git" ]; then
              echo "📦 Pulling latest changes..."
              cd $DEPLOY_PATH
              git config --global --add safe.directory $DEPLOY_PATH
              git remote set-url origin $REPO_URL
              git fetch origin
              git reset --hard HEAD
              git clean -fd
              git checkout $BRANCH
              git reset --hard origin/$BRANCH
            else
              echo "🔄 Cloning repository..."
              git clone -b $BRANCH $REPO_URL $DEPLOY_PATH
              cd $DEPLOY_PATH
            fi
            
            # Stop old containers
            echo "⛔ Stopping old containers..."
            cd $DEPLOY_PATH
            pwd
            docker compose down || true
            sleep 2
            
            # Build and start new containers
            echo "🐳 Building and starting containers..."
            cd $DEPLOY_PATH
            docker compose pull
            docker compose build --no-cache
            docker compose up -d
            
            # Wait for services to be healthy
            echo "⏳ Waiting for services to start..."
            cd $DEPLOY_PATH
            sleep 10
            
            # Health check
            echo "🏥 Health check..."
            if curl -f http://localhost:5000/api/xassidas?limit=1 > /dev/null 2>&1; then
              echo "✅ API is healthy!"
            else
              echo "❌ API health check failed"
              docker compose logs api
              exit 1
            fi
            
            # Database stats
            echo "📊 Database stats:"
            docker exec malikina-db psql -U malikina -d malikina -c "
              SELECT 
                'Xassidas' as item, COUNT(*) as count FROM xassidas
              UNION ALL
              SELECT 'Authors', COUNT(*) FROM authors
              UNION ALL
              SELECT 'Verses', COUNT(*) FROM verses;
            " 2>/dev/null || echo "Could not fetch stats"
            
            echo "================================"
            echo "✅ Deployment successful!"
            echo "API: https://165-245-211-201.sslip.io/api"
            echo "================================"
              cd $DEPLOY_PATH
            fi
            
            # Load environment variables from .deploy-secrets
            if [ -f /root/.deploy-secrets/.env.api ]; then
              export $(cat /root/.deploy-secrets/.env.api | xargs)
            fi
            
            # Create .env from environment variables
            cat > $DEPLOY_PATH/.env << EOF
            PORT=5000
            NODE_ENV=production
            DB_HOST=$DB_HOST
            DB_PORT=$DB_PORT
            DB_USER=$DB_USER
            DB_PASSWORD=$DB_PASSWORD
            DB_NAME=$DB_NAME
            FRONTEND_URL=$FRONTEND_URL
            OCR_SPACE_API_KEY=$OCR_SPACE_API_KEY
            ADMIN_SECRET=$ADMIN_SECRET
            EOF
            
            # Stop existing containers
            echo "Stopping existing containers..."
            docker-compose -f $DEPLOY_PATH/docker-compose.yml down || true
            
            # Build and start containers
            echo "Building and starting containers..."
            docker-compose -f $DEPLOY_PATH/docker-compose.yml build
            docker-compose -f $DEPLOY_PATH/docker-compose.yml up -d
            
            # Wait for API to be ready
            echo "Waiting for API to be ready..."
            sleep 10
            
            # Health check
            curl -f http://localhost:5000/ || exit 1
            
            echo "✅ Deployment successful!"
