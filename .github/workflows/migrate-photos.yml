name: Migrate Author Photos to Spaces

on:
  workflow_dispatch:

jobs:
  migrate:
    runs-on: ubuntu-latest

    steps:
      - name: Run photo migration via SSH
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.DEPLOY_HOST }}
          username: ${{ secrets.DEPLOY_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          timeout: 120s
          script: |
            echo "=== Files in dist/scripts/ ==="
            docker exec malikina-api ls dist/scripts/ 2>/dev/null || echo "(directory not found)"
            echo "=== Running migration with tsx ==="
            docker exec malikina-api node_modules/.bin/tsx scripts/migrate-photos-to-spaces.ts
            echo "Done."
