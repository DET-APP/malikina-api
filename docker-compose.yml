version: '3.8'

services:
  postgres:
    image: postgres:16-alpine
    container_name: malikina-db
    environment:
      POSTGRES_USER: ${DB_USER:-malikina}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-malikina}
      POSTGRES_DB: ${DB_NAME:-malikina}
    volumes:
      - /var/lib/malikina/postgres-data:/var/lib/postgresql/data
      - ./db/migrations:/docker-entrypoint-initdb.d
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-malikina}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - malikina-network

  api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: malikina-api
    environment:
      NODE_ENV: ${NODE_ENV:-development}
      PORT: ${PORT:-5000}
      DB_HOST: postgres
      DB_PORT: 5432
      DB_USER: ${DB_USER:-malikina}
      DB_PASSWORD: ${DB_PASSWORD:-malikina}
      DB_NAME: ${DB_NAME:-malikina}
      FRONTEND_URL: ${FRONTEND_URL:-http://localhost:5173}
      OCR_SPACE_API_KEY: ${OCR_SPACE_API_KEY:-}
      ADMIN_SECRET: ${ADMIN_SECRET:-}
    depends_on:
      postgres:
        condition: service_healthy
    ports:
      - "5000:5000"
    volumes:
      - ./public:/app/public
    networks:
      - malikina-network
    restart: unless-stopped

networks:
  malikina-network:
    driver: bridge

volumes:
  postgres_data:
    driver: local
